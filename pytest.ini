[pytest]
# Pytest configuration for NLCRUD project

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show extra summary info
addopts = -v --tb=short --strict-markers -ra

# Markers for different test types
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, test full pipeline)
    slow: Slow tests that require external services (Ollama, etc)

# Coverage options (when running with pytest-cov)
# addopts = --cov=nlcrud --cov-report=html --cov-report=term-missing

# Disable warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
