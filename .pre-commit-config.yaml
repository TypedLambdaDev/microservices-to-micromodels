# Pre-commit hooks configuration for NLCRUD
# Install: pre-commit install
# Update: pre-commit autoupdate
# Run manually: pre-commit run --all-files

repos:
  # Prevent direct use of pip/pip3
  - repo: local
    hooks:
      - id: no-pip-install
        name: No pip install (use uv instead)
        entry: bash -c 'if git diff --cached --name-only | grep -E "requirements|setup\.py|poetry\.lock"; then echo "ERROR: Use uv for package management, not pip, poetry, or setuptools"; exit 1; fi'
        language: system
        stages: [commit]

  - repo: local
    hooks:
      - id: no-pip-in-dockerfile
        name: No pip in Dockerfile (use uv instead)
        entry: bash -c 'if grep -r "pip install\|pip3 install\|poetry install" . --include="Dockerfile*" 2>/dev/null; then echo "ERROR: Dockerfiles should use uv, not pip"; exit 1; fi'
        language: system
        types: [dockerfile]
        pass_filenames: false

  # Code formatting and linting
  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
